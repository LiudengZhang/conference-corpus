site_name: AACR Annual Meeting 2026
site_description: Session transcripts and poster abstracts from the AACR Annual Meeting 2026, organized by topic.
repo_url: https://github.com/LiudengZhang/aacr-2026
repo_name: LiudengZhang/aacr-2026

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/tabulator.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/tabulator.min.js
  - javascripts/posters.js
  - javascripts/tools-table.js
  - https://hypothes.is/embed.js

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Topics:
    - Agentic AI:
      - Overview: topics/agentic-ai/index.md
      - Landscape: topics/agentic-ai/landscape.md
      - Synthesis — AT02 vs corpus: topics/agentic-ai/synthesis-at02-vs-corpus.md
    - Single-Cell & Spatial Omics:
      - Overview: topics/single-cell-spatial-omics/index.md
      - Landscape: topics/single-cell-spatial-omics/landscape.md
      - Synthesis — spatial eating scRNA: topics/single-cell-spatial-omics/synthesis-spatial-eating-sc.md
    - Virtual Cells:
      - Overview: topics/virtual-cells/index.md
      - Landscape: topics/virtual-cells/landscape.md
      - Synthesis — ED03 vs corpus: topics/virtual-cells/synthesis-ed03-vs-corpus.md
    - Bioinfo / Comp Bio / AI Methods:
      - Overview: topics/bioinfo-tools/index.md
      - Landscape: topics/bioinfo-tools/landscape.md
      - Synthesis — FM pathology traction: topics/bioinfo-tools/synthesis-fm-pathology-traction.md
      - Tools:
        - Index: topics/bioinfo-tools/tools/index.md
        - CHIEF: topics/bioinfo-tools/tools/chief.md
        - Prov-GigaPath: topics/bioinfo-tools/tools/prov-gigapath.md
        - UNI / UNI2: topics/bioinfo-tools/tools/uni.md
        - Geneformer: topics/bioinfo-tools/tools/geneformer.md
        - scGPT: topics/bioinfo-tools/tools/scgpt.md
        - Cell2Location: topics/bioinfo-tools/tools/cell2location.md
    - Clinical Trials:
      - Overview: topics/clinical-trials/index.md
      - Landscape: topics/clinical-trials/landscape.md
      - Synthesis — trial-design methodology: topics/clinical-trials/synthesis-trial-design-methodology.md
  - Session Transcripts:
    - All sessions: sessions/index.md
  - Notes:
    - Extraction method: notes/extraction.md
    - Caveats: notes/caveats.md
