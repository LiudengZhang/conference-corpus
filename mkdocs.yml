site_name: Conference Corpus
site_description: Conference intelligence for 2026 (plus a EuroBioC 2025 pilot for the bioinformatics-tools template) — built vaults for AACR, Nextflow Summit, and JPM, plus scaffolded coverage for ASCO, ESMO, SITC, ASH, ISMB, RECOMB, NeurIPS, RSNA, and AGBT.
repo_url: https://github.com/LiudengZhang/conference-corpus
repo_name: LiudengZhang/conference-corpus

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/tabulator.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/tabulator.min.js
  - javascripts/posters.js
  - javascripts/tools-table.js
  - https://hypothes.is/embed.js

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

